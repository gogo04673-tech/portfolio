name: portfolio
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  get_it: ^9.0.5
  equatable: ^2.0.7
  intl: ^0.20.2
  lottie: ^3.3.2
  shared_preferences: ^2.5.3
  animated_text_kit: ^4.3.0
  google_fonts: ^6.3.3
  responsive_framework: ^1.5.1
  flutter_screenutil: ^5.9.3
  adaptive_ui_layout: ^1.1.0
  device_info_plus: ^12.3.0
  go_router: ^17.0.1
  flutter_svg: any

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true
  generate: true

  assets:
    - assets/lottie/
    - assets/images/
    - assets/icons/


  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Bold.ttf
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 700